<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Sedang Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 90%;
        }

        .gears {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 30px;
        }

        .gear {
            width: 50px;
            height: 50px;
            animation: spin 4s linear infinite;
        }

        .gear:nth-child(2) {
            animation: spin-reverse 4s linear infinite;
            margin-top: 15px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        .gear svg {
            fill: #667eea;
            width: 100%;
            height: 100%;
        }

        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        p {
            color: #b8b8d4;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            width: 60%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            animation: loading 2s ease-in-out infinite;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }

        .dots span {
            animation: blink 1.4s infinite both;
            font-size: 1.5rem;
            color: #667eea;
        }

        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }

        .countdown {
            color: #667eea;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="gears">
            <div class="gear">
                <svg viewBox="0 0 100 100">
                    <path d="M97.6,55.7V44.3l-13.6-2.9c-0.8-3.3-2.1-6.4-3.7-9.3l7.8-11.2l-8.1-8.1L68.8,20.6c-2.9-1.6-6-2.9-9.3-3.7L56.6,3.3H44.3 l-2.9,13.6c-3.3,0.8-6.4,2.1-9.3,3.7L20.9,12.8l-8.1,8.1l7.8,11.2c-1.6,2.9-2.9,6-3.7,9.3L3.3,44.3v11.4l13.6,2.9 c0.8,3.3,2.1,6.4,3.7,9.3l-7.8,11.2l8.1,8.1l11.2-7.8c2.9,1.6,6,2.9,9.3,3.7l2.9,13.6h11.4l2.9-13.6c3.3-0.8,6.4-2.1,9.3-3.7 l11.2,7.8l8.1-8.1l-7.8-11.2c1.6-2.9,2.9-6,3.7-9.3L97.6,55.7z M50,65c-8.3,0-15-6.7-15-15c0-8.3,6.7-15,15-15s15,6.7,15,15 C65,58.3,58.3,65,50,65z"/>
                </svg>
            </div>
            <div class="gear">
                <svg viewBox="0 0 100 100">
                    <path d="M97.6,55.7V44.3l-13.6-2.9c-0.8-3.3-2.1-6.4-3.7-9.3l7.8-11.2l-8.1-8.1L68.8,20.6c-2.9-1.6-6-2.9-9.3-3.7L56.6,3.3H44.3 l-2.9,13.6c-3.3,0.8-6.4,2.1-9.3,3.7L20.9,12.8l-8.1,8.1l7.8,11.2c-1.6,2.9-2.9,6-3.7,9.3L3.3,44.3v11.4l13.6,2.9 c0.8,3.3,2.1,6.4,3.7,9.3l-7.8,11.2l8.1,8.1l11.2-7.8c2.9,1.6,6,2.9,9.3,3.7l2.9,13.6h11.4l2.9-13.6c3.3-0.8,6.4-2.1,9.3-3.7 l11.2,7.8l8.1-8.1l-7.8-11.2c1.6-2.9,2.9-6,3.7-9.3L97.6,55.7z M50,65c-8.3,0-15-6.7-15-15c0-8.3,6.7-15,15-15s15,6.7,15,15 C65,58.3,58.3,65,50,65z"/>
                </svg>
            </div>
        </div>

        <h1>Sedang Maintenance</h1>

        <p>
            Website kami sedang dalam perbaikan untuk memberikan pengalaman yang lebih baik.
            <br>Kami akan segera kembali!
        </p>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <p style="font-size: 0.95rem;">
            Sedang bekerja keras
            <span class="dots">
                <span>.</span><span>.</span><span>.</span>
            </span>
        </p>

        <div class="countdown">
            Terima kasih atas kesabaran Anda
        </div>
    </div>

    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
